name: CMake on a single platform
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Qt6
      run: sudo apt-get update && sudo apt-get install -y qt6-base-dev qt6-tools-dev

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

  test:
    runs-on: ubuntu-latest
    needs: build          # runs after build succeeds
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Qt6
      run: sudo apt-get update && sudo apt-get install -y qt6-base-dev qt6-tools-dev

    - name: Configure CMake Debug
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

    - name: Build Tests
      run: cmake --build ${{github.workspace}}/build --target askFM_tests

    - name: Run Unit Tests
      run: ${{github.workspace}}/build/askFM_tests --gtest_output=xml:test_results.xml

    - name: Upload Test Results
      if: always()    # upload even if tests fail
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test_results.xml
